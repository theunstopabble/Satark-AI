name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_API_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
      - name: Skip (no hook configured)
        if: ${{ secrets.RENDER_API_DEPLOY_HOOK == '' }}
        run: echo "⚠️  RENDER_API_DEPLOY_HOOK not set — skipping deploy"

  deploy-engine:
    name: Deploy Engine → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.RENDER_ENGINE_DEPLOY_HOOK }}"
      - name: Skip (no hook configured)
        if: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK == '' }}
        run: echo "⚠️  RENDER_ENGINE_DEPLOY_HOOK not set — skipping deploy"

  deploy-worker:
    name: Deploy Worker → Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/worker
          command: deploy
      - name: Skip (no token configured)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "⚠️  CLOUDFLARE_API_TOKEN not set — skipping deploy"
